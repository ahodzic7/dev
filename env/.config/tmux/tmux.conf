set -g default-terminal "tmux-256color"
set -s escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g status-style 'bg=#333333 fg=#5eacd3'
set -g base-index 1

# keep terminal transparency; grey out inactive panes via dim fg only
set -g window-style 'fg=#6c6c6c,bg=terminal'
set -g window-active-style 'fg=terminal,bg=terminal'

# per-pane title strip: active label green, inactive dim. thin single borders.
set -g pane-border-lines single
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[fg=#00ff00#,bold],#[fg=#6c6c6c]} #P #{pane_current_command} '
set -g pane-border-style 'fg=#444444'
set -g pane-active-border-style 'fg=#00ff00'

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/personal/dev/todo.md"

# forget the find window.  That is for chumps
bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"

# even inside full-screen TUIs (claude, nvim). C-f = project sessionizer, C-g = claude finder.
bind -n C-f run-shell "tmux neww tmux-sessionizer"
bind -n C-g run-shell "tmux neww claude-finder"

# harpoon-style session pinning
bind a run-shell "tmux-harpoon add '#{session_name}' '#{session_path}' '#{window_id}' '#{pane_id}'"
bind A command-prompt -p "harpoon slot (u/i/o):" "run-shell \"tmux-harpoon set %1 '#{session_name}' '#{session_path}' '#{window_id}' '#{pane_id}'\""
# explorer popup: vim buffer over the list — dd deletes, reorder lines, Enter jumps
bind e display-popup -E -w 70 -h 8 "tmux-harpoon edit"
# jump to pinned slots
bind u run-shell "tmux-harpoon jump 1"
bind i run-shell "tmux-harpoon jump 2"
bind o run-shell "tmux-harpoon jump 3"
